name: Test Commit Syntax

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test-buildscript*

jobs:
  secretChecks:
    name: Secrets Check
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.secretChecks.outputs.success }}
    steps:
      - name: Secret Checks
        id: secretChecks
        uses: Nomi-CEu/SecretChecker@9de55f1a6e04dfa7ead446328c0420bb0a748e81 # v1.1.0
        with:
          secrets: ${{ toJSON(secrets) }}
          check: CFCORE_API_TOKEN

  testCommits:
    # Only allow runs that have the CFCORE_API_TOKEN secret (e.g. we are in the main repo)
    if: needs.secretChecks.outputs.success == 'true'
    name: Test Commits
    needs: secretChecks
    uses: ./.github/workflows/createchangelog.yml
    with:
      release_type: "Cutting Edge Build"
      test: true
    secrets: inherit
